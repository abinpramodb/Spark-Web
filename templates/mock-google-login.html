<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #202124;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .google-logo {
            margin-bottom: 16px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 8px;
            color: #202124;
        }

        .subtitle {
            font-size: 16px;
            color: #5f6368;
            margin-bottom: 30px;
        }

        .subtitle strong {
            color: #202124;
        }

        .account-list {
            list-style: none;
            border-top: 1px solid #dadce0;
            border-bottom: 1px solid #dadce0;
            margin-bottom: 24px;
            text-align: left;
        }

        .account-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            cursor: pointer;
            border-bottom: 1px solid #f1f3f4;
            transition: background 0.15s;
        }
        .account-item:last-child {
            border-bottom: none;
        }

        .account-item:hover {
            background-color: #f8f9fa;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #3b82f6;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 15px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .account-details {
            flex-grow: 1;
        }

        .account-name {
            font-size: 14px;
            font-weight: 500;
            color: #3c4043;
        }

        .account-email {
            font-size: 12px;
            color: #5f6368;
        }

        .custom-form {
            display: none;
            flex-direction: column;
            gap: 16px;
            text-align: left;
            margin-top: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 500;
            color: #3c4043;
        }

        .input-text {
            padding: 12px 14px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        .input-text:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.1);
        }

        .btn-submit {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-submit:hover {
            background-color: #1557b0;
        }

        .use-other-btn {
            background: none;
            border: none;
            color: #1a73e8;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            display: inline-block;
        }

        .use-other-btn:hover {
            color: #1557b0;
        }

        /* Spinner for loading state */
        .spinner-overlay {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-top: 3px solid #1a73e8;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- Google Logo SVG -->
        <svg class="google-logo" width="75" height="24" viewBox="0 0 74 24">
            <path d="M12.24 10.285V14.4h6.887c-.648 3.51-3.778 6.022-8.127 6.022a8.877 8.877 0 0 1-8.877-8.877 8.877 8.877 0 0 1 8.877-8.877c2.302 0 4.39.813 6.022 2.408l3.125-3.125C17.158 2.052 14.887 1 12.24 1A11.24 11.24 0 0 0 1 12.24a11.24 11.24 0 0 0 11.24 11.24c6.078 0 10.11-4.27 10.11-10.285 0-.693-.057-1.373-.173-1.915H12.24z" fill="#4285F4"/>
            <path d="M30.414 1a6.025 6.025 0 0 0-6.022 6.022v8.877a6.025 6.025 0 0 0 6.022 6.022 6.025 6.025 0 0 0 6.022-6.022V7.022A6.025 6.025 0 0 0 30.414 1zm1.758 14.899a1.76 1.76 0 0 1-1.758 1.758 1.76 1.76 0 0 1-1.758-1.758V7.022c0-.97.788-1.758 1.758-1.758.97 0 1.758.788 1.758 1.758v8.877z" fill="#EA4335"/>
            <path d="M43.766 1a6.025 6.025 0 0 0-6.022 6.022v8.877a6.025 6.025 0 0 0 6.022 6.022 6.025 6.025 0 0 0 6.022-6.022V7.022A6.025 6.025 0 0 0 43.766 1zm1.758 14.899a1.76 1.76 0 0 1-1.758 1.758 1.76 1.76 0 0 1-1.758-1.758V7.022c0-.97.788-1.758 1.758-1.758.97 0 1.758.788 1.758 1.758v8.877z" fill="#FBBC05"/>
            <path d="M57.119 7.022v14.877H53.07v-.973c-.927.87-2.183 1.393-3.51 1.393a5.532 5.532 0 0 1-5.53-5.53 5.532 5.532 0 0 1 5.53-5.53c1.327 0 2.583.523 3.51 1.393V7.022c0-.97-.788-1.758-1.758-1.758a1.76 1.76 0 0 0-1.758 1.758H45.4c0-2.923 2.378-5.3 5.302-5.3a5.308 5.308 0 0 1 5.302 5.3c0 .354.116.702.116 1.05zM53.07 16.78a1.76 1.76 0 0 0-1.758-1.758 1.76 1.76 0 0 0-1.758 1.758 1.76 1.76 0 0 0 1.758 1.758 1.76 1.76 0 0 0 1.758-1.758z" fill="#4285F4"/>
            <path d="M64.07 1V22.24H60.02V1h4.05z" fill="#34A853"/>
            <path d="M72.24 10.285a4.793 4.793 0 0 0-4.79 4.79c0 1.314.544 2.5 1.417 3.376l-3.328 3.328A9.585 9.585 0 0 1 61 12.24a9.585 9.585 0 0 1 9.58-9.58c3.275 0 6.068 1.637 7.785 4.148l-3.328 3.328a4.794 4.794 0 0 0-2.8-1.077z" fill="#EA4335"/>
        </svg>

        <div id="select-account-view">
            <h1>Choose an account</h1>
            <div class="subtitle">to continue to <strong>Spark Web</strong></div>

            <ul class="account-list">
                <li class="account-item" onclick="loginAccount('Abin Pramodb', 'abinpramodb@gmail.com', 'AP')">
                    <div class="avatar" style="background-color: #3b82f6;">AP</div>
                    <div class="account-details">
                        <div class="account-name">Abin Pramodb</div>
                        <div class="account-email">abinpramodb@gmail.com</div>
                    </div>
                </li>
                <li class="account-item" onclick="loginAccount('John Developer', 'john.dev@gmail.com', 'JD')">
                    <div class="avatar" style="background-color: #10b981;">JD</div>
                    <div class="account-details">
                        <div class="account-name">John Developer</div>
                        <div class="account-email">john.dev@gmail.com</div>
                    </div>
                </li>
            </ul>

            <button class="use-other-btn" onclick="showCustomForm()">Use another account</button>
        </div>

        <!-- Custom Account Form -->
        <div id="custom-account-view" style="display: none;">
            <h1>Sign in</h1>
            <div class="subtitle">Use your Google Account</div>

            <form class="custom-form" style="display: flex;" onsubmit="handleCustomSubmit(event)">
                <div class="input-group">
                    <label for="user-name">Your Full Name</label>
                    <input type="text" id="user-name" class="input-text" placeholder="e.g. Abin Pramodb" required>
                </div>
                <div class="input-group">
                    <label for="user-email">Email Address</label>
                    <input type="email" id="user-email" class="input-text" placeholder="name@gmail.com" required>
                </div>
                <button type="submit" class="btn-submit">Next</button>
            </form>

            <button class="use-other-btn" onclick="showAccountList()" style="margin-top: 20px;">Back to Account List</button>
        </div>

        <!-- Loading spinner view -->
        <div class="spinner-overlay" id="loading-view">
            <div class="spinner"></div>
            <div style="font-size: 14px; color: #5f6368;">Verifying with Google...</div>
        </div>
    </div>

    <script>
        function loginAccount(name, email, initials) {
            document.getElementById('select-account-view').style.display = 'none';
            document.getElementById('custom-account-view').style.display = 'none';
            document.getElementById('loading-view').style.display = 'flex';

            setTimeout(() => {
                const payload = {
                    source: 'tf-google-login',
                    email: email,
                    name: name,
                    picture: `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=6366f1&color=fff`
                };
                
                window.opener.postMessage(payload, '*');
                window.close();
            }, 1200);
        }

        function handleCustomSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('user-name').value.trim();
            const email = document.getElementById('user-email').value.trim();
            
            loginAccount(name, email, name.substring(0, 2).toUpperCase());
        }

        function showCustomForm() {
            document.getElementById('select-account-view').style.display = 'none';
            document.getElementById('custom-account-view').style.display = 'block';
        }

        function showAccountList() {
            document.getElementById('select-account-view').style.display = 'block';
            document.getElementById('custom-account-view').style.display = 'none';
        }
    </script>
</body>
</html>
